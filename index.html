<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Glow - Lofi Room Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-neon: #d946ef;
            --text-main: #f3f4f6;
            --glass: rgba(15, 15, 20, 0.75);
            --border-glow: rgba(217, 70, 239, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: default;
        }

        body {
            /* Lofi & Chill Oyuncu Odası Görseli */
            background: url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            font-family: 'JetBrains+Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Arka planı biraz karartıp menüyü öne çıkaran filtre */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 25, 0.6);
            backdrop-filter: blur(6px);
            z-index: -1;
        }

        /* --- GLITCH EFEKTİ --- */
        .glitch-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 0.05em 0 0 #ff00ff, -0.05em -0.025em 0 #00ffff;
            animation: glitch 3s infinite;
            margin-bottom: 30px;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #ff00ff, -0.05em -0.025em 0 #00ffff; }
            14% { text-shadow: 0.05em 0 0 #ff00ff, -0.05em -0.025em 0 #00ffff; }
            15% { text-shadow: -0.05em -0.025em 0 #ff00ff, 0.025em 0.035em 0 #00ffff; }
            49% { text-shadow: -0.05em -0.025em 0 #ff00ff, 0.025em 0.035em 0 #00ffff; }
            50% { text-shadow: 0.025em 0.05em 0 #ff00ff, 0.05em 0 0 #00ffff; }
            99% { text-shadow: 0.025em 0.05em 0 #ff00ff, 0.05em 0 0 #00ffff; }
            100% { text-shadow: -0.025em 0 0 #ff00ff, -0.025em -0.025em 0 #00ffff; }
        }

        /* --- ANA PANEL --- */
        #app-container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            border: 1px solid var(--border-glow);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .question-box {
            font-size: 1.1rem;
            min-height: 80px;
            margin-bottom: 20px;
            color: #00ffff;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: #00ffff;
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .btn-grid {
            display: grid;
            gap: 15px;
        }

        button {
            background: rgba(0, 0, 0, 0.5);
            color: var(--text-main);
            border: 1px solid var(--border-glow);
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            border-radius: 5px;
        }

        button:hover {
            background: var(--border-glow);
            color: #fff;
            box-shadow: 0 0 15px var(--border-glow);
            transform: scale(1.02);
            cursor: pointer;
        }

        .hidden { display: none; }

        /* --- RULET ANİMASYONU --- */
        #roulette {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-neon);
            margin: 20px 0;
            font-weight: 700;
        }

        .result-box {
            padding: 20px;
            border: 2px solid var(--accent-neon);
            background: rgba(217, 70, 239, 0.1);
            margin-top: 20px;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 5px;
        }

        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .suggestion {
            font-size: 0.8rem;
            color: #00ffff;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="app-container">
        <div class="glitch-title">MIDNIGHT SNACK</div>
        
        <div id="quiz-ui">
            <div class="question-box">
                <span id="typewriter"></span><span class="cursor"></span>
            </div>
            <div id="options" class="btn-grid"></div>
        </div>

        <div id="result-ui" class="hidden">
            <div id="roulette">ANALYZING...</div>
            <div id="final-result" class="hidden">
                <p style="font-size: 0.8rem; color: #8b949e;">YOUR DATA MATCHES:</p>
                <div class="result-box">
                    <h2 id="snack-name" style="margin-bottom: 5px;"></h2>
                    <p id="place-name" class="suggestion"></p>
                </div>
                <button onclick="location.reload()" style="margin-top: 30px; width: 100%;">REBOOT TEST</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { id: 'oneHand', text: "> CAN YOU EAT WITH ONE HAND?", options: [{l:"YES", v:"yes"}, {l:"NO", v:"no"}] },
            { id: 'hunger', text: "> INITIALIZING HUNGER SCAN...", options: [{l:"LOW", v:"low"}, {l:"MEDIUM", v:"medium"}, {l:"HIGH", v:"high"}] },
            { id: 'greasy', text: "> ARE GREASY FOODS ACCEPTABLE?", options: [{l:"AFFIRMATIVE", v:"yes"}, {l:"NEGATIVE", v:"no"}] },
            { id: 'gameType', text: "> SELECT GAMEPLAY MODE:", options: [{l:"COMPETITIVE", v:"competitive"}, {l:"CASUAL", v:"casual"}] },
            { id: 'budget', text: "> BUDGET ALLOCATION:", options: [{l:"LOW", v:"low"}, {l:"MEDIUM", v:"medium"}, {l:"HIGH", v:"high"}] }
        ];

        const snacks = [
            { name: "🌯 CHICKEN WRAP", place: "Dürümcü Kardeşler or Getir", tags: { oneHand: "yes", hunger: "medium", greasy: "no", gameType: "competitive", budget: "medium" } },
            { name: "🍔 BURGER MENU", place: "Burger King or Local Smash Burger", tags: { oneHand: "no", hunger: "high", greasy: "yes", gameType: "casual", budget: "high" } },
            { name: "🍕 PIZZA SLICE", place: "Pizza Locale or Dominos", tags: { oneHand: "yes", hunger: "medium", greasy: "yes", gameType: "casual", budget: "low" } },
            { name: "🍜 NOODLES", place: "Wok to Walk", tags: { oneHand: "no", hunger: "high", greasy: "no", gameType: "casual", budget: "medium" } },
            { name: "🥪 TOAST SANDWICH", place: "Kardeşler Büfe", tags: { oneHand: "yes", hunger: "medium", greasy: "no", gameType: "casual", budget: "low" } },
            { name: "🍫 GRANOLA BAR", place: "Migros Jet", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "competitive", budget: "low" } },
            { name: "🥨 CRACKERS", place: "Your pantry / Local Market", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "casual", budget: "low" } },
            { name: "🍎 FRUIT BOWL", place: "Kitchen Fridge", tags: { oneHand: "no", hunger: "low", greasy: "no", gameType: "casual", budget: "medium" } },
            { name: "🥡 INSTANT RAMEN", place: "Boil water, check cabinets!", tags: { oneHand: "no", hunger: "medium", greasy: "no", gameType: "casual", budget: "low" } },
            { name: "💪 PROTEIN BAR", place: "Macrocenter", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "competitive", budget: "medium" } }
        ];

        let currentIdx = 0;
        let answers = {};

        function typeWriter(text, i, cb) {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML = text.substring(0, i+1);
                setTimeout(() => typeWriter(text, i + 1, cb), 40);
            } else if (cb) { cb(); }
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById("options").innerHTML = "";
            document.getElementById("typewriter").innerHTML = "";
            
            typeWriter(q.text, 0, () => {
                q.options.forEach(opt => {
                    const b = document.createElement("button");
                    b.innerText = opt.l;
                    b.onclick = () => {
                        answers[q.id] = opt.v;
                        currentIdx++;
                        if (currentIdx < questions.length) showQuestion();
                        else showResult();
                    };
                    document.getElementById("options").appendChild(b);
                });
            });
        }

        function showResult() {
            document.getElementById("quiz-ui").classList.add("hidden");
            document.getElementById("result-ui").classList.remove("hidden");
            
            let rouletteIdx = 0;
            const rouletteEl = document.getElementById("roulette");
            const interval = setInterval(() => {
                rouletteEl.innerText = snacks[rouletteIdx % snacks.length].name;
                rouletteIdx++;
            }, 80);

            setTimeout(() => {
                clearInterval(interval);
                calculateWinner();
            }, 2500);
        }

        function calculateWinner() {
            let best = snacks[0];
            let max = -1;
            snacks.forEach(s => {
                let score = 0;
                for (let k in answers) { if (s.tags[k] === answers[k]) score++; }
                if (score > max) { max = score; best = s; }
            });

            document.getElementById("roulette").classList.add("hidden");
            document.getElementById("final-result").classList.remove("hidden");
            document.getElementById("snack-name").innerText = best.name;
            document.getElementById("place-name").innerText = "SPOT: " + best.place;
        }

        showQuestion();
    </script>
</body>
</html>
