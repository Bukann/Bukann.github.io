<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Late-Night Snack Recommender</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #090a0f; 
            --surface-color: #1a1d24;
            --text-main: #f3f4f6;
            --text-muted: #8b949e;
            --accent-color: #8b5cf6; 
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10vh 20px 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka planda yüzen neon ışık hüzmeleri */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            z-index: -1;
            animation: floatGlow 15s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 60%);
            border-radius: 50%;
            z-index: -1;
            animation: floatGlow 12s ease-in-out infinite alternate-reverse;
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .header-section {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 0px;
            font-weight: 400;
        }

        #quiz-container, #result-container {
            background: rgba(26, 29, 36, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            width: 100%;
        }

        .question-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 24px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background-color: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px var(--accent-glow);
        }

        button.clicked-effect {
            transform: scale(0.96) translateY(0) !important;
            background-color: rgba(139, 92, 246, 0.2) !important;
            border-color: var(--accent-color) !important;
            box-shadow: inset 0 0 15px var(--accent-glow), 0 0 15px var(--accent-glow) !important;
            transition: all 0.15s ease-out !important;
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            border: none;
            margin-top: 24px;
            box-shadow: 0 4px 15px var(--accent-glow);
            color: white;
        }

        button.primary:hover {
            box-shadow: 0 8px 25px var(--accent-glow);
            background-color: transparent;
        }

        button.primary.clicked-effect {
            transform: scale(0.92) !important;
        }

        #result-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-snack {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin: 24px 0;
            padding: 30px 20px;
            width: 100%;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: inset 0 0 30px rgba(139, 92, 246, 0.15), 0 10px 40px -10px var(--accent-glow);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255,255,255,0.05);
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="header-section">
            <h1 id="main-title">Izmir - Snack</h1>
            <p class="subtitle" id="main-subtitle">Let's find the perfect choice for you.</p>
        </div>

        <div id="quiz-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div id="question-text" class="question-title">Loading...</div>
            <div id="options-container" class="options-grid">
                <!-- Buttons will be injected here via JS -->
            </div>
        </div>

        <div id="result-container" class="hidden">
            <p class="subtitle">Your optimal snack is:</p>
            <div id="snack-result" class="result-snack">...</div>
            <button class="primary" id="restart-btn" onclick="startOver(event)">Find Another Snack</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                id: 'oneHand',
                text: "Can you eat with one hand?",
                options: [
                    { label: "Yes", value: "yes" },
                    { label: "No", value: "no" }
                ]
            },
            {
                id: 'hunger',
                text: "How hungry are you?",
                options: [
                    { label: "Not very hungry", value: "low" },
                    { label: "Moderately hungry", value: "medium" },
                    { label: "Very hungry", value: "high" }
                ]
            },
            {
                id: 'greasy',
                text: "Are greasy foods okay?",
                options: [
                    { label: "Yes", value: "yes" },
                    { label: "No", value: "no" }
                ]
            },
            {
                id: 'gameType',
                text: "What type of game are you playing?",
                options: [
                    { label: "Competitive", value: "competitive" },
                    { label: "Casual", value: "casual" }
                ]
            },
            {
                id: 'budget',
                text: "What's your budget?",
                options: [
                    { label: "Low", value: "low" },
                    { label: "Medium", value: "medium" },
                    { label: "High", value: "high" }
                ]
            }
        ];

        const snacks = [
            { name: "🌯 Chicken Wrap", tags: { oneHand: "yes", hunger: "medium", greasy: "no", gameType: "competitive", budget: "medium" } },
            { name: "🍔 Burger Menu", tags: { oneHand: "no", hunger: "high", greasy: "yes", gameType: "casual", budget: "high" } },
            { name: "🍕 Pizza Slice", tags: { oneHand: "yes", hunger: "medium", greasy: "yes", gameType: "casual", budget: "low" } },
            { name: "🍜 Noodles", tags: { oneHand: "no", hunger: "high", greasy: "no", gameType: "casual", budget: "medium" } },
            { name: "🥪 Toast Sandwich", tags: { oneHand: "yes", hunger: "medium", greasy: "no", gameType: "casual", budget: "low" } },
            { name: "🍫 Granola Bar", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "competitive", budget: "low" } },
            { name: "🥨 Crackers", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "competitive", budget: "low" } },
            { name: "🍎 Fruit Bowl", tags: { oneHand: "no", hunger: "low", greasy: "no", gameType: "casual", budget: "medium" } },
            { name: "🥡 Instant Ramen", tags: { oneHand: "no", hunger: "medium", greasy: "no", gameType: "casual", budget: "low" } },
            { name: "💪 Protein Bar", tags: { oneHand: "yes", hunger: "low", greasy: "no", gameType: "competitive", budget: "medium" } }
        ];

        let currentQuestionIndex = 0;
        let userAnswers = {};

        const questionTextEl = document.getElementById('question-text');
        const optionsContainerEl = document.getElementById('options-container');
        const quizContainerEl = document.getElementById('quiz-container');
        const resultContainerEl = document.getElementById('result-container');
        const snackResultEl = document.getElementById('snack-result');
        const progressEl = document.getElementById('progress');

        function initApp() {
            currentQuestionIndex = 0;
            userAnswers = {};
            quizContainerEl.classList.remove('hidden');
            resultContainerEl.classList.add('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            
            const progressPercentage = (currentQuestionIndex / questions.length) * 100;
            progressEl.style.width = `${progressPercentage}%`;

            questionTextEl.textContent = q.text;
            optionsContainerEl.innerHTML = '';

            q.options.forEach(option => {
                const btn = document.createElement('button');
                btn.textContent = option.label;
                btn.onclick = (e) => {
                    // Animasyonu tetiklemek için class ekle
                    btn.classList.add('clicked-effect');
                    
                    // Butonun içe çökme animasyonu izlendikten sonra (200ms) diğer soruya geç
                    setTimeout(() => {
                        handleAnswer(q.id, option.value);
                    }, 200);
                };
                optionsContainerEl.appendChild(btn);
            });
        }

        function handleAnswer(questionId, answerValue) {
            userAnswers[questionId] = answerValue;
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            progressEl.style.width = '100%';

            let bestSnack = snacks[0];
            let maxScore = -1;

            snacks.forEach(snack => {
                let score = 0;
                for (const [key, val] of Object.entries(userAnswers)) {
                    if (snack.tags[key] === val) {
                        score++;
                    }
                }

                if (score > maxScore) {
                    maxScore = score;
                    bestSnack = snack;
                }
            });

            quizContainerEl.classList.add('hidden');
            snackResultEl.textContent = bestSnack.name;
            resultContainerEl.classList.remove('hidden');
        }

        function startOver(event) {
            if(event) {
                const btn = event.target;
                btn.classList.add('clicked-effect');
                setTimeout(() => {
                    btn.classList.remove('clicked-effect');
                    initApp();
                }, 200);
            } else {
                initApp();
            }
        }

        function setDynamicTitle() {
            const titleEl = document.getElementById('main-title');
            
            const hour = new Date().getHours();
            let timeContext = "Late-Night";
            if (hour >= 6 && hour < 12) timeContext = "Morning";
            else if (hour >= 12 && hour < 18) timeContext = "Afternoon";
            else if (hour >= 18 && hour < 23) timeContext = "Evening";

            titleEl.textContent = `Izmir - ${timeContext} Snack`;
        }

        window.onload = () => {
            setDynamicTitle();
            initApp();
        };
    </script>
</body>
</html>
